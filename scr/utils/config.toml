[theme]
# Tema base: "light" ou "dark"
base = "light"

# Cores personalizadas (opcional)
primaryColor = "#F63366"        # Cor principal (botões, links)
backgroundColor = "#FFFFFF"      # Fundo principal
secondaryBackgroundColor = "#F0F2F6"  # Fundo secundário (sidebar)
textColor = "#262730"            # Cor do texto
font = "sans serif"              # Fonte

# Forçar tema claro mesmo se o sistema for escuro
[server]
enableCORS = false
enableXsrfProtection = true

[browser]
gatherUsageStats = false